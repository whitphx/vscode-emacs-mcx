name: Update Keybindings

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-keybindings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # For Takumi Guard OIDC-based audit logging.

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "18"
          cache: "npm"

      - name: Set up Takumi Guard for npm
        uses: flatt-security/setup-takumi-guard-npm@f0e333d43cd7a88d2caabee1f16048baab3a35a9 # v1.1.1
        with:
          bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}
      - name: Install Aikido Safe Chain
        uses: ./.github/actions/install-safe-chain

      - name: Install dependencies
        run: npm ci

      - name: Generate keybindings
        run: npm run gen-keys

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet package.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create changeset
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          node -e "
          const writeChangeset = require('@changesets/write').default ?? require('@changesets/write');
          writeChangeset(
            {
              summary: 'Update keybindings from the latest remote definitions.',
              releases: [{ name: 'emacs-mcx', type: 'patch' }],
            },
            process.cwd()
          );
          "
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            package.json
            .changeset/*.md
          commit-message: "Update keybindings in package.json"
          title: "chore: Update keybindings from latest remote definitions"
          body: |
            This PR automatically updates the keybindings in `package.json` by running `npm run gen-keys`.

            The keybinding generator depends on remote files that are sometimes updated, so this ensures our keybinding definitions stay up-to-date.
          branch: auto-update-keybindings
          delete-branch: true
          labels: |
            automated
            keybindings
