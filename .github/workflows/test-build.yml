name: Test and Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  set-build-info:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.build-info.outputs.branch }}
      tag: ${{ steps.build-info.outputs.tag }}
      trigger-sha: ${{ steps.build-info.outputs.trigger-sha }}
      head-sha: ${{ steps.build-info.outputs.head-sha }}
      pr-number: ${{ steps.build-info.outputs.pr-number }}
    steps:
      - name: Save build info (pull_request)
        if: github.event_name == 'pull_request'
        run: |
          echo "${{ github.event.pull_request.head.ref }}" > branch
          echo "" > tag
          echo "${{ github.event.pull_request.head.sha }}" > head-sha
          echo "${{ github.sha }}" > trigger-sha
          echo "${{ github.event.pull_request.number }}" > pr-number
      - name: Save build info (push, branch)
        if: github.event_name == 'push' && github.ref_type == 'branch'
        run: |
          echo "${{ github.ref_name }}" > branch
          echo "" > tag
          echo "${{ github.sha }}" > head-sha
          echo "${{ github.sha }}" > trigger-sha
          echo "" > pr-number
      - name: Save build info (push, tag)
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          echo "" > branch
          echo "${{ github.ref_name }}" > tag
          echo "${{ github.sha }}" > head-sha
          echo "${{ github.sha }}" > trigger-sha
          echo "" > pr-number
      - name: Output build info
        id: build-info
        run: |
          echo "branch=$(cat branch)" >> $GITHUB_OUTPUT
          echo "tag=$(cat tag)" >> $GITHUB_OUTPUT
          echo "trigger-sha=$(cat trigger-sha)" >> $GITHUB_OUTPUT
          echo "head-sha=$(cat head-sha)" >> $GITHUB_OUTPUT
          echo "pr-number=$(cat pr-number)" >> $GITHUB_OUTPUT
      - name: Upload build info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-info
          path: |
            branch
            tag
            head-sha
            trigger-sha
            pr-number

  test:
    strategy:
      fail-fast: false
      matrix:
        # Use macos-15-intel instead of macos-latest (arm64). The macos-15-
        # arm64 hosted-runner image rolled forward to release 20260520.0085
        # (macOS 15.7.7) and ~324 of our extension-host tests started failing
        # on that image only. The same macOS version on Intel is green; the
        # regression is bounded to the arm64 image, not the OS, not VS Code,
        # and not our test code — diagnostic PRs in this branch's history
        # ruled those out one at a time.
        #
        # `macos-15-intel` (not `macos-latest-large`, also not `macos-26-
        # intel`) is deliberate: `macos-latest-large` failed allocation 3
        # runs in a row (3-sec exits, empty `runner_name`) for unclear GHA-
        # side reasons, and `macos-26-intel` is newer but unproven for this
        # job. `macos-15-intel` is an alias of `macos-15-large`, which we
        # already validated passes (4m31s and 4m43s in this branch's
        # history). Re-evaluate once the arm64 image regression is fixed
        # upstream and we can return to `macos-latest`.
        os: [macos-15-intel, ubuntu-latest, windows-latest]
        type: ["native"]
        include:
          - os: ubuntu-latest
            type: "web"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # For Takumi Guard OIDC-based audit logging.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Set up Takumi Guard for npm
        uses: flatt-security/setup-takumi-guard-npm@f0e333d43cd7a88d2caabee1f16048baab3a35a9 # v1.1.1
        with:
          bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}
      - name: Install Aikido Safe Chain
        uses: ./.github/actions/install-safe-chain

      - name: Install dependencies
        run: npm ci
        env:
          # Avoid Playwright's postinstall browser download during `npm ci`.
          # The native jobs do not use Playwright browsers, and the web job
          # uses the Chrome already present on the GitHub-hosted Ubuntu image.
          # Keeping browser provisioning out of `npm ci` also avoids installer
          # stalls before the actual test/build steps start.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: ESLint & Prettier
        run: |
          npm run check:eslint
          npm run check:prettier

      - name: Test keybinding generator
        run: npm run test-gen-keys

      - name: Check keybinding diff
        run: |
          npm run gen-keys
          git diff --exit-code -- package.json || (echo "You have to run 'npm run gen-keys' and commit the updated package.json" && exit -1)

      - name: Build for test
        run: npm run webpack
        if: matrix.type == 'native'

      - name: Test
        run: xvfb-run -a npm test
        if: runner.os == 'Linux' && matrix.type == 'native'
      - name: Test
        run: npm test
        if: runner.os != 'Linux' && matrix.type == 'native'

      # `vscode-test-web` launches `playwright.chromium` internally and does
      # not expose a CLI option for Playwright's `executablePath`. Because
      # `npm ci` skips Playwright's browser download above, Playwright's managed
      # Chromium paths would otherwise be missing. Point those expected paths at
      # the Chrome already installed on the GitHub-hosted Ubuntu image.
      - name: Use system Chrome for web tests
        run: |
          chrome_path="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser)"
          for playwright_chromium_path in \
            "$(node -e "console.log(require('playwright').chromium.executablePath())")" \
            "$(node -e "const { registry } = require('./node_modules/playwright-core/lib/server/registry'); console.log(registry.findExecutable('chromium-headless-shell').executablePath('javascript'))")"
          do
            mkdir -p "$(dirname "$playwright_chromium_path")"
            ln -sf "$chrome_path" "$playwright_chromium_path"
            "$playwright_chromium_path" --version
          done
        if: matrix.type == 'web'

      - name: Test Web
        run: npm run test:web -- --headless --browserOption=--disable-dev-shm-usage
        if: matrix.type == 'web'
        timeout-minutes: 10

  build:
    needs: [test, set-build-info]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Set up Takumi Guard for npm
        uses: flatt-security/setup-takumi-guard-npm@f0e333d43cd7a88d2caabee1f16048baab3a35a9 # v1.1.1
        with:
          bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}
      - name: Install Aikido Safe Chain
        uses: ./.github/actions/install-safe-chain

      - name: Install dependencies
        run: npm ci
        env:
          # Build packaging does not execute browser tests, so downloading
          # Playwright browsers here only adds network work and another source
          # of install-time failures.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      # Ref: https://github.com/redhat-developer/vscode-yaml/blob/89c53763249932454b766d09e7aa9035da7fb5b8/.github/workflows/CI.yaml#L48-L61
      - name: Build the vsix package on Linux
        id: build
        run: |
          if [ $IS_RELEASE = true ]; then
            VERSION=$(node -p "require('./package.json').version")
          else
            VERSION=${{ github.sha }}
          fi
          if [ ${IS_PRE_RELEASE} = true ]; then
            FLAGS="--pre-release"
          else
            FLAGS=""
          fi
          OUTPUT_FILE_NAME=emacs-mcx-${VERSION}-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}.vsix

          npm exec -- vsce package -o ${OUTPUT_FILE_NAME} ${FLAGS}

          echo "filename=${OUTPUT_FILE_NAME}" >> $GITHUB_OUTPUT
        env:
          IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}
          IS_PRE_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-pre') }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.build.outputs.filename }}
        # This step may fail when the PR is created by an external contributor and the CI is run in their scope.
        # We can ignore such failures because the following jobs such as E2E-testing in the post-build workflow don't necessarily need the attestation,
        # while the verification is done when publishing the artifact.
        continue-on-error: true

      - name: Upload the vsix built on Linux
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.build.outputs.filename }}
          name: emacs-mcx
